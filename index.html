    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    .morning {
      background: #f8f5f0; color: #4a4340; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 4rem 1.25rem; position: relative;
    }
    .morning::before {
      content: ''; position: absolute; inset: 0; opacity: 0.03; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px;
    }
    .morning::after {
      content: ''; position: absolute; top: -20%; right: -10%; width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(196,168,130,0.08) 0%, transparent 70%); pointer-events: none;
    }
    .morning .container { --accent: #c4a882; --accent-soft: #e8ddd0; --border: #ece6de; --bg-card: #fffdf9; --text: #4a4340; --text-light: #9b918a; }

    .evening {
      background: #1a1a2e; color: #e0dbd3; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 4rem 1.25rem; position: relative;
    }
    .evening::before {
      content: ''; position: absolute; inset: 0; opacity: 0.04; pointer-events: none;

      background-size: 256px;
    }
    .evening::after {
      content: ''; position: absolute; bottom: -15%; left: -10%; width: 55vw; height: 55vw;
      background: radial-gradient(circle, rgba(120,100,180,0.07) 0%, transparent 70%); pointer-events: none;
    }
    .evening .container { --accent: #a89cc8; --accent-soft: #3d3a52; --border: #2e2b45; --bg-card: #22213a; --text: #e0dbd3; --text-light: #8a8499; }

    .container { max-width: 620px; width: 100%; position: relative; z-index: 1; }
    .header { text-align: center; margin-bottom: 2.5rem; animation: fadeDown 1s ease both; }
    .icon { width: 40px; height: 40px; margin: 0 auto 1rem; opacity: 0.7; }
    .icon svg { width: 100%; height: 100%; }
    .header h1 { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 2rem; letter-spacing: 0.03em; color: var(--text); margin-bottom: 0.35rem; }
    .header .date { font-size: 0.85rem; color: var(--text-light); letter-spacing: 0.08em; text-transform: uppercase; }
    .divider { width: 48px; height: 1px; background: var(--accent); margin: 0 auto 2.5rem; opacity: 0.5; animation: fadeIn 1.2s ease both 0.3s; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2.25rem; box-shadow: 0 2px 24px rgba(0,0,0,0.06); animation: fadeUp 1s ease both 0.4s; }
    .theme-label { display: inline-block; font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent-soft); border-radius: 100px; padding: 0.3rem 0.9rem; margin-bottom: 1.5rem; }
    .affirmation { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 1.3rem; line-height: 1.85; color: var(--text); }
    .voice-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin: 1.5rem auto 0; padding: 0.6rem 1.4rem; background: transparent; border: 1px solid var(--accent-soft); border-radius: 100px; color: var(--accent); font-family: 'Nunito', sans-serif; font-weight: 400; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; }
    .voice-btn:hover { background: var(--accent); color: var(--bg-card); border-color: var(--accent); }
    .voice-btn:hover svg { stroke: var(--bg-card); }
    .voice-btn svg { width: 16px; height: 16px; stroke: var(--accent); fill: none; transition: stroke 0.3s ease; }
    .voice-btn.speaking { background: var(--accent); color: var(--bg-card); border-color: var(--accent); }
    .voice-btn.speaking svg { stroke: var(--bg-card); }
    .footer { text-align: center; margin-top: 2.5rem; animation: fadeIn 1s ease both 0.8s; }
    .footer p { font-size: 0.78rem; color: var(--text-light); letter-spacing: 0.04em; }
    .day-count { font-weight: 400; }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .banner { text-align: center; padding: 2.5rem 1.25rem 0; position: relative; z-index: 1; }
    .banner.morning-mode { background: #f8f5f0; }
    .banner.morning-mode .wave-text { color: #4a4340; }
    .banner.evening-mode { background: #1a1a2e; }
    .banner.evening-mode .wave-text { color: #e0dbd3; }
    .wave-text { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 1.05rem; letter-spacing: 0.04em; display: inline-flex; flex-wrap: wrap; justify-content: center; gap: 0 0.3em; }
    .wave-text .wave-char { display: inline-block; animation: wave 3s ease-in-out infinite; }
    @keyframes wave { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }

    .lang-toggle { position: fixed; top: 1rem; right: 1rem; z-index: 100; display: flex; align-items: center; gap: 0.4rem; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 100px; padding: 0.35rem 0.5rem; cursor: pointer; transition: all 0.3s ease; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; font-family: 'Nunito', sans-serif; font-weight: 400; user-select: none; }
    .lang-toggle.morning-mode { background: rgba(74,67,64,0.06); border: 1px solid rgba(74,67,64,0.12); color: #9b918a; }
    .lang-toggle.evening-mode { background: rgba(168,156,200,0.1); border: 1px solid rgba(168,156,200,0.2); color: #8a8499; }
    .lang-toggle:hover { transform: scale(1.05); }
    .lang-flag { font-size: 1.1rem; line-height: 1; }
    .lang-label { font-size: 0.68rem; }

    /* Music toggle */
    .music-toggle {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 100px;
      padding: 0.35rem 0.55rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Nunito', sans-serif;
      font-weight: 400;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      user-select: none;
    }
    .music-toggle.morning-mode { background: rgba(74,67,64,0.06); border: 1px solid rgba(74,67,64,0.12); color: #9b918a; }
    .music-toggle.evening-mode { background: rgba(168,156,200,0.1); border: 1px solid rgba(168,156,200,0.2); color: #8a8499; }
    .music-toggle:hover { transform: scale(1.05); }
    .music-toggle svg { width: 16px; height: 16px; }

    /* Animated bars when playing */
    .music-bars { display: flex; align-items: flex-end; gap: 2px; height: 14px; }
    .music-bars .bar {
      width: 2.5px;
      border-radius: 1px;
      animation: none;
    }
    .music-toggle.morning-mode .bar { background: #c4a882; }
    .music-toggle.evening-mode .bar { background: #a89cc8; }
    .music-toggle.playing .bar { animation: barPulse 0.8s ease-in-out infinite; }
    .music-bars .bar:nth-child(1) { height: 5px; animation-delay: 0s; }
    .music-bars .bar:nth-child(2) { height: 9px; animation-delay: 0.15s; }
    .music-bars .bar:nth-child(3) { height: 7px; animation-delay: 0.3s; }
    .music-bars .bar:nth-child(4) { height: 11px; animation-delay: 0.1s; }

    @keyframes barPulse {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }

    .copyright { text-align: center; padding: 2rem 1.25rem; }
    .copyright.morning-mode { background: #f8f5f0; border-top: 1px solid #ece6de; }
    .copyright.morning-mode p { color: #9b918a; }
    .copyright.evening-mode { background: #141425; border-top: 1px solid #2e2b45; }

    .copyright p { font-family: 'Nunito', sans-serif; font-weight: 300; font-size: 0.75rem; letter-spacing: 0.06em; }

    @media (max-width: 480px) {

      .card { padding: 1.75rem 1.5rem; }
      .affirmation { font-size: 1.15rem; }
      .wave-text { font-size: 0.9rem; }
    }

    // ══════════════════════════════════════

    // ══════════════════════════════════════
    function seededRandom(seed) {
      let s = seed % 2147483647; if (s <= 0) s += 2147483646;
      return function () { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
    }
    function isLeapYear(y) { return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0; }
    function getDayOfYear(d) { return Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 864e5); }
    function formatDate(d, lang) {
      if (lang === "mn") {
        const m = ["Нэгдүгээр сар","Хоёрдугаар сар","Гуравдугаар сар","Дөрөвдүгээр сар","Тавдугаар сар","Зургадугаар сар","Долдугаар сар","Наймдугаар сар","Есдүгээр сар","Аравдугаар сар","Арван нэгдүгээр сар","Арван хоёрдугаар сар"];
        const w = ["Ням","Даваа","Мягмар","Лхагва","Пүрэв","Баасан","Бямба"];
        return `${w[d.getDay()]}, ${d.getFullYear()} оны ${m[d.getMonth()]}ын ${d.getDate()}`;
      }
      return d.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
    }

    function buildParagraph(pools, themes, themeLabels, seed, dayOfYear) {
      const rng = seededRandom(seed);
      const primaryIdx = (dayOfYear - 1) % themes.length;
      const primaryTheme = themes[primaryIdx];
      const primary = [...pools[primaryTheme]];
      const selected = [];
      function pick(arr) { const i = Math.floor(rng() * arr.length); return arr.splice(i, 1)[0]; }
      for (let i = 0; i < 4; i++) selected.push(pick(primary));
      const others = themes.filter(t => t !== primaryTheme);
      const s1 = others[Math.floor(rng() * others.length)];
      const r = others.filter(t => t !== s1);
      const s2 = r[Math.floor(rng() * r.length)];
      selected.push(pick([...pools[s1]]));
      selected.push(pick([...pools[s2]]));
      return { theme: themeLabels[primaryTheme], paragraph: selected.join(" ") };
    }

    let currentLang = "en";

    function buildWaveText(text) {
      const c = document.getElementById("wave-text"); c.innerHTML = ""; let ci = 0;
      const lines = text.split("\n");
      lines.forEach((line, li) => {
        line.split("").forEach(ch => {
          if (ch === " ") { const s = document.createElement("span"); s.innerHTML = "&nbsp;"; s.style.width = "0.3em"; c.appendChild(s); }
          else { const s = document.createElement("span"); s.className = "wave-char"; s.textContent = ch; s.style.animationDelay = (ci * 0.07) + "s"; c.appendChild(s); ci++; }
        });
        if (li < lines.length - 1) {
          const br = document.createElement("div");
          br.style.width = "100%";
          br.style.height = "0.4rem";
          c.appendChild(br);
        }
      });
    }

    function setupVoice(btnId, getTextFn) {
      const btn = document.getElementById(btnId);
      if (!btn || btn.closest(".hidden")) return;
      const pi = btn.querySelector(".icon-play"), si = btn.querySelector(".icon-stop"), lb = btn.querySelector(".voice-label");
      let sp = false;
      function stop() { speechSynthesis.cancel(); sp = false; btn.classList.remove("speaking"); pi.style.display = ""; si.style.display = "none"; lb.textContent = "Read Aloud"; }
      function start() {
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(getTextFn()); u.rate = 0.92; u.pitch = 1.0;
        const v = speechSynthesis.getVoices();
        const pv = v.find(x => x.lang.startsWith("en") && (x.name.includes("Samantha") || x.name.includes("Google") || x.name.includes("Natural"))) || v.find(x => x.lang.startsWith("en"));
        if (pv) u.voice = pv;
        u.onend = stop; u.onerror = stop; speechSynthesis.speak(u);
        sp = true; btn.classList.add("speaking"); pi.style.display = "none"; si.style.display = ""; lb.textContent = "Stop";
      }
      btn.addEventListener("click", () => { if (currentLang !== "en") return; if (sp) stop(); else start(); });
    }

    // ══════════════════════════════════════
    // AMBIENT MUSIC (Web Audio API - Melodious)
    // ══════════════════════════════════════
    let audioCtx = null;
    let musicPlaying = false;
    let musicNodes = [];
    let melodyInterval = null;

    function createAmbientMusic() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const master = audioCtx.createGain();
      master.gain.value = 0.18;
      master.connect(audioCtx.destination);

      // Reverb via convolver (simple impulse)
      const convolver = audioCtx.createConvolver();
      const rate = audioCtx.sampleRate;
      const length = rate * 3;
      const impulse = audioCtx.createBuffer(2, length, rate);
      for (let ch = 0; ch < 2; ch++) {
        const data = impulse.getChannelData(ch);
        for (let i = 0; i < length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
        }
      }
      convolver.buffer = impulse;
      const reverbGain = audioCtx.createGain();
      reverbGain.gain.value = 0.4;
      convolver.connect(reverbGain);
      reverbGain.connect(master);

      // Dry path
      const dryGain = audioCtx.createGain();
      dryGain.gain.value = 0.6;
      dryGain.connect(master);

      // Warm pad drone (quiet foundation)
      const padFreqs = isMorning ? [174, 220, 261] : [146, 174, 220];
      padFreqs.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        osc.type = "sine";
        osc.frequency.value = freq;
        const g = audioCtx.createGain();
        g.gain.value = 0;
        const now = audioCtx.currentTime;
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(0.03, now + 4 + i);
        const lfo = audioCtx.createOscillator();
        lfo.type = "sine";
        lfo.frequency.value = 0.04 + (i * 0.015);
        const lfoG = audioCtx.createGain();
        lfoG.gain.value = 0.008;
        lfo.connect(lfoG);
        lfoG.connect(g.gain);
        lfo.start();
        const filt = audioCtx.createBiquadFilter();
        filt.type = "lowpass";
        filt.frequency.value = isMorning ? 700 : 450;
        filt.Q.value = 0.4;
        osc.connect(filt);
        filt.connect(g);
        g.connect(dryGain);
        g.connect(convolver);
        osc.start();
        musicNodes.push(osc, lfo, g, filt, lfoG);
      });

      // Melody note player
      const morningScale = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
      const eveningScale = [220.00, 246.94, 261.63, 293.66, 329.63, 349.23, 392.00, 440.00];
      const scale = isMorning ? morningScale : eveningScale;

      // Pentatonic-ish melody pattern (indices into scale) for a gentle feel
      const morningPattern = [0, 2, 4, 7, 4, 5, 2, 4, 0, 2, 5, 7, 4, 2, 0, 5];
      const eveningPattern = [7, 5, 4, 2, 0, 2, 4, 5, 7, 4, 2, 0, 2, 5, 4, 7];
      const pattern = isMorning ? morningPattern : eveningPattern;
      let noteIndex = 0;

      function playNote() {
        if (!audioCtx || audioCtx.state !== "running") return;
        const now = audioCtx.currentTime;
        const freq = scale[pattern[noteIndex % pattern.length]];
        noteIndex++;

        // Main tone (sine, soft)
        const osc = audioCtx.createOscillator();
        osc.type = "sine";
        osc.frequency.value = freq;

        // Gentle overtone
        const osc2 = audioCtx.createOscillator();
        osc2.type = "sine";
        osc2.frequency.value = freq * 2;

        const noteGain = audioCtx.createGain();
        noteGain.gain.setValueAtTime(0, now);
        noteGain.gain.linearRampToValueAtTime(0.08, now + 0.15);
        noteGain.gain.exponentialRampToValueAtTime(0.001, now + 3.5);

        const overtoneGain = audioCtx.createGain();
        overtoneGain.gain.setValueAtTime(0, now);
        overtoneGain.gain.linearRampToValueAtTime(0.015, now + 0.1);
        overtoneGain.gain.exponentialRampToValueAtTime(0.001, now + 2);

        const filt = audioCtx.createBiquadFilter();
        filt.type = "lowpass";
        filt.frequency.value = isMorning ? 2000 : 1200;
        filt.Q.value = 0.3;

        osc.connect(noteGain);
        osc2.connect(overtoneGain);
        noteGain.connect(filt);
        overtoneGain.connect(filt);
        filt.connect(dryGain);
        filt.connect(convolver);

        osc.start(now);
        osc2.start(now);
        osc.stop(now + 4);
        osc2.stop(now + 3);
      }

      // Play notes at varying intervals for organic feel
      let nextDelay = 800;
      function scheduleNext() {
        if (!musicPlaying) return;
        playNote();
        // Vary timing: 1.2s to 2.8s between notes
        nextDelay = 1200 + Math.random() * 1600;
        melodyInterval = setTimeout(scheduleNext, nextDelay);
      }

      // Start melody after a gentle 2s intro
      melodyInterval = setTimeout(scheduleNext, 2000);

      musicNodes.push(master, convolver, reverbGain, dryGain);
    }

    function startMusic() {
      if (!audioCtx) {
        createAmbientMusic();
      } else if (audioCtx.state === "suspended") {
        audioCtx.resume();
        // Restart melody loop
        if (!melodyInterval) {
          function restartMelody() {
            if (!musicPlaying) return;
            // Trigger a note via the existing closure — recreate a simple scheduler
            const now = audioCtx.currentTime;
            const morningScale = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
            const eveningScale = [220.00, 246.94, 261.63, 293.66, 329.63, 349.23, 392.00, 440.00];
            const scale = isMorning ? morningScale : eveningScale;
            const morningPat = [0, 2, 4, 7, 4, 5, 2, 4, 0, 2, 5, 7, 4, 2, 0, 5];
            const eveningPat = [7, 5, 4, 2, 0, 2, 4, 5, 7, 4, 2, 0, 2, 5, 4, 7];
            const pat = isMorning ? morningPat : eveningPat;
            const idx = Math.floor(Math.random() * pat.length);
            const freq = scale[pat[idx]];

            const osc = audioCtx.createOscillator();
            osc.type = "sine";
            osc.frequency.value = freq;
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0, now);
            g.gain.linearRampToValueAtTime(0.08, now + 0.15);
            g.gain.exponentialRampToValueAtTime(0.001, now + 3.5);
            const f = audioCtx.createBiquadFilter();
            f.type = "lowpass";
            f.frequency.value = isMorning ? 2000 : 1200;
            osc.connect(g);
            g.connect(f);
            f.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 4);

            melodyInterval = setTimeout(restartMelody, 1200 + Math.random() * 1600);
          }
          melodyInterval = setTimeout(restartMelody, 500);
        }
      }
      musicPlaying = true;
      musicBtn.classList.add("playing");
    }

    function stopMusic() {
      if (audioCtx) audioCtx.suspend();
      if (melodyInterval) { clearTimeout(melodyInterval); melodyInterval = null; }
      musicPlaying = false;
      musicBtn.classList.remove("playing");
    }

    musicBtn.addEventListener("click", () => {
      if (musicPlaying) { stopMusic(); } else { startMusic(); }
    });
  </script>
</body>
</html>
